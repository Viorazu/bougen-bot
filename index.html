  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;

    display: flex;
    flex-direction: column;
    height: 92vh;
  }

    font-size: 1.3rem;
    color: #888;
    margin-bottom: 6px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 12px;
  }

  .select-screen {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 16px;
  }

  .mode-btn {
    padding: 12px 18px;
    border: 2px solid #333;
    border-radius: 14px;
    background: #222;
    color: #e0e0e0;
    font-size: 0.9rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    line-height: 1.5;
  }

  .mode-btn:hover {
    border-color: #d32f2f;
    background: #2a2020;
  }

  .mode-btn .mode-name {
    font-weight: 700;
    display: block;
    margin-bottom: 1px;
  }

  .mode-btn .mode-desc {
    color: #777;
    font-size: 0.78rem;
  }

  .chat-screen {
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .chat-screen.active {
    display: flex;
  }

  .mode-label {
    text-align: center;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 10px;
    cursor: pointer;
  }

  .mode-label:hover {
    color: #999;
    text-decoration: underline;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .msg {
    max-width: 80%;
    padding: 11px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: #d32f2f;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    align-self: flex-start;
    background: #2a2a2a;
    color: #999;
    border-bottom-left-radius: 4px;
  }

  .input-area {
    display: flex;
    gap: 10px;
    padding: 12px 0;
  }

  input {
    flex: 1;
    padding: 13px 18px;
    border: 2px solid #333;
    border-radius: 30px;
    background: #222;
    color: #e0e0e0;
    font-size: 1rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #d32f2f; }
  input::placeholder { color: #555; }

  button.send-btn {
    padding: 13px 22px;
    border: none;
    border-radius: 30px;
    background: #d32f2f;
    color: #fff;
    font-size: 1rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  button.send-btn:disabled { background: #555; cursor: not-allowed; }

  .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .select-screen::-webkit-scrollbar { width: 4px; }
  .select-screen::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .counter {
    text-align: center;
    font-size: 0.75rem;
    color: #444;
    padding-top: 4px;

var currentMode = '';
var count = 0;
var lastReply = '';

var chatArea = document.getElementById('chatArea');
var msgInput = document.getElementById('msgInput');
var sendBtn = document.getElementById('sendBtn');

function startChat(mode) {
  currentMode = mode;
  count = 0;
  lastReply = '';
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('chatScreen').classList.add('active');
  document.getElementById('modeLabel').textContent = '\u25C0 ' + modeNames[mode] + '\uFF08\u30BF\u30C3\u30D7\u3067\u623B\u308B\uFF09';
  chatArea.innerHTML = '';
  addMsg(greetings[mode], 'bot');
  updateCounter();
  msgInput.focus();
}

function backToSelect() {
  document.getElementById('selectScreen').style.display = 'flex';
  document.getElementById('chatScreen').classList.remove('active');
  chatArea.innerHTML = '';
  currentMode = '';
  count = 0;
  updateCounter();
}

function updateCounter() {
  document.getElementById('counter').textContent = count > 0 ? count + '\u4EF6\u306E\u66B4\u8A00\u3092\u56DE\u53CE\u3057\u307E\u3057\u305F' : '';
}

msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing) {
    send();
  }
});

function addMsg(text, type) {
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function pickReply() {
  var pool = replies[currentMode];
  var reply;
  do {
    reply = pool[Math.floor(Math.random() * pool.length)];
  } while (reply === lastReply && pool.length > 1);
  lastReply = reply;
  return reply;
}

function send() {
  var text = msgInput.value.trim();
  if (!text) return;

  addMsg(text, 'user');
  msgInput.value = '';
  sendBtn.disabled = true;
  count++;

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, mode: currentMode })
  }).catch(function() {});

  setTimeout(function() {
    addMsg(pickReply(), 'bot');
    sendBtn.disabled = false;
    updateCounter();
    msgInput.focus();
  }, 800 + Math.random() * 1200);
}
